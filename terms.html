<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Terms of Use – MingleBy</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      color: #333;
      background: #fff;
    }

    .wrap {
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    /* Header */
    h1 {
      font-size: 28px;
      font-weight: 700;
      color: #111;
      margin-bottom: 6px;
    }

    .meta {
      font-size: 14px;
      color: #666;
      margin-bottom: 36px;
    }

    /* Table of contents */
    .toc {
      background: #f7f7f8;
      border: 1px solid #e4e4e7;
      border-radius: 8px;
      padding: 24px 28px;
      margin-bottom: 44px;
    }

    .toc p {
      font-weight: 700;
      font-size: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: #111;
      margin-bottom: 12px;
    }

    .toc ol {
      padding-left: 20px;
    }

    .toc li {
      margin-bottom: 4px;
    }

    .toc a {
      font-size: 14px;
      color: #0070f3;
      text-decoration: none;
    }

    .toc a:hover { text-decoration: underline; }

    /* Sections */
    .section {
      margin-bottom: 40px;
    }

    h2 {
      font-size: 17px;
      font-weight: 700;
      color: #111;
      text-transform: uppercase;
      letter-spacing: 0.03em;
      margin-bottom: 14px;
      padding-top: 8px;
    }

    p {
      margin-bottom: 14px;
      color: #444;
    }

    ul, ol {
      padding-left: 24px;
      margin-bottom: 14px;
    }

    li {
      margin-bottom: 6px;
      color: #444;
    }

    a { color: #0070f3; }
